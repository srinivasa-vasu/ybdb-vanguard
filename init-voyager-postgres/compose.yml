services:
  postgresql:
    container_name: postgres
    image: postgres:14
    # postgres:14 is multi-arch (arm64 + amd64) — no platform pin needed.
    # Use the shared Docker network so the devcontainer can reach PostgreSQL
    # by container name ("postgres"). This avoids all host.docker.internal /
    # network_mode: host complications with docker-outside-of-docker on macOS.
    networks:
      - ybdb-vanguard-net
    command: postgres -c wal_level=logical -c max_replication_slots=10 -c max_wal_senders=10
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: on-failure
    environment:
      POSTGRES_PASSWORD: yugabyte
      POSTGRES_DB: postgres

  voyager:
    container_name: yb-voyager
    platform: linux/amd64
    image: yugabytedb/yb-voyager:latest
    command: "echo Hello from yb-voyager!"

networks:
  ybdb-vanguard-net:
    external: true   # pre-created by initializeCommand in devcontainer.json

volumes:
  postgresql_data:
