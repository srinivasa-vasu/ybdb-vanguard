version: 1

services:
  ybdb:
    name: "YugabyteDB Cluster"
    description: "Launches a 3-node local YugabyteDB cluster using yugabyted"
    env:
      DATA_PATH: ybdb
    commands:
      start: |
        set -e
        echo "🚀 Starting YugabyteDB 3-node cluster..."
        BASE_DIR="${PWD}/${DATA_PATH}"
        mkdir -p "$BASE_DIR"

        yugabyted start --base_dir="$BASE_DIR/ybd1" \
          --advertise_address=127.0.0.1 \
          --cloud_location=ybcloud.pandora.az1 \
          --fault_tolerance=zone

        yugabyted start --base_dir="$BASE_DIR/ybd2" \
          --advertise_address=127.0.0.2 \
          --join=127.0.0.1 \
          --cloud_location=ybcloud.pandora.az2 \
          --fault_tolerance=zone

        yugabyted start --base_dir="$BASE_DIR/ybd3" \
          --advertise_address=127.0.0.3 \
          --join=127.0.0.1 \
          --cloud_location=ybcloud.pandora.az3 \
          --fault_tolerance=zone

        yugabyted configure data_placement \
          --fault_tolerance=zone \
          --base_dir="$BASE_DIR/ybd1"

        echo "✅ YugabyteDB cluster is running."
      ready: |
        # Health check: ensure YSQL port is open
        nc -z 127.0.0.1 5433
      stop: |
        echo "🛑 Stopping YugabyteDB cluster..."
        yugabyted stop --base_dir="${PWD}/${DATA_PATH}/ybd1" || true
        yugabyted stop --base_dir="${PWD}/${DATA_PATH}/ybd2" || true
        yugabyted stop --base_dir="${PWD}/${DATA_PATH}/ybd3" || true
        echo "✅ Cluster stopped."
    depends_on: []

tasks:
  init-ysql:
    name: "Initialize YSQL (chinook + sample data)"
    description: "Loads chinook.sql and sample.sql into the YSQL database, then opens an interactive shell."
    env:
      ART_PATH: init-qt
    command: |
      set -e
      echo "⏳ Waiting for YSQL to become ready..."
      for i in {1..15}; do
        if nc -z 127.0.0.1 5433; then
          echo "✅ YSQL is available!"
          break
        fi
        sleep 2
      done

      echo "📦 Loading seed data..."
      ysqlsh -f "${PWD}/${ART_PATH}/chinook.sql" -f "${PWD}/${ART_PATH}/sample.sql" || true

      echo "🔗 Launching interactive YSQL shell..."
      ysqlsh
    depends_on:
      - ybdb
    triggers:
      - postDevcontainerStart
      - manual
