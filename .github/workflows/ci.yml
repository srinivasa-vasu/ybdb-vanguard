name: CI

on:
  push:
    branches: [main]
    paths:
      - .ybdb.Dockerfile
      - .devcontainer/**
  pull_request:
    paths:
      - .ybdb.Dockerfile
      - .devcontainer/**
  schedule:
    # Weekly version drift check — Monday 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  # ── 1. Validate all devcontainer.json files ──────────────────────────────────
  lint-devcontainer:
    name: Lint devcontainer configs
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install @devcontainers/cli
        run: npm install -g @devcontainers/cli

      - name: Validate all devcontainer.json files
        run: |
          find .devcontainer -name "devcontainer.json" | while read f; do
            echo "Validating: $f"
            devcontainer read-configuration --workspace-folder . \
              --config "$f" > /dev/null && echo "  ✅ OK"
          done

  # ── 2. Build the base image ──────────────────────────────────────────────────
  build-image:
    name: Build devcontainer image
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .ybdb.Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ybdb-vanguard:ci

      - name: Smoke-test — yugabyted version
        run: docker run --rm ybdb-vanguard:ci yugabyted version

  # ── 3. Weekly version drift check ───────────────────────────────────────────
  # Runs on schedule only. Posts ::notice:: annotations — no noise, no PRs.
  # Check the Actions tab on Monday to see if anything needs bumping.
  check-versions:
    name: Check for newer versions
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Check latest YugabyteDB stable release
        run: |
          CURRENT=$(grep 'ARG YB_VERSION=' .ybdb.Dockerfile | cut -d= -f2)
          LATEST=$(curl -sf https://api.github.com/repos/yugabyte/yugabyte-db/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "YugabyteDB pinned: $CURRENT  →  latest: $LATEST"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "::notice file=.ybdb.Dockerfile::YugabyteDB $LATEST is available (pinned: $CURRENT). Bump YB_VERSION and YB_BUILD."
          fi

      - name: Check latest YugabyteDB Debezium connector
        run: |
          CURRENT=$(grep 'YBDB_CONNECTOR_VERSION' .devcontainer/init-cdc/devcontainer.json \
            | grep -o '"dz[^"]*"' | tr -d '"')
          LATEST=$(curl -sf https://api.github.com/repos/yugabyte/debezium/releases/latest \
            | jq -r '.tag_name')
          echo "YB Debezium connector pinned: $CURRENT  →  latest: $LATEST"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "::notice file=.devcontainer/init-cdc/devcontainer.json::YB Debezium connector $LATEST is available (pinned: $CURRENT). Bump YBDB_CONNECTOR_VERSION."
          fi
