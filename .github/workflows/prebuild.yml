name: Codespaces Prebuild

# Rebuilds the devcontainer images and stores them in GHCR so that
# Codespace creation pulls a cached layer instead of building from scratch.
# Reduces cold-start from ~5 min → ~30 sec for workshop participants.
#
# Setup (one-time):
#   Repository Settings → Codespaces → Prebuild configurations
#   Add one entry per exercise pointing to .devcontainer/<exercise>/devcontainer.json
#   Set "Trigger" to "On push" and region(s) where participants will work.
#
# This workflow complements that by publishing the base image to GHCR so
# the prebuild has a warm cache to pull from.

on:
  push:
    branches: [main]
    paths:
      - .ybdb.Dockerfile
      - .devcontainer/**
  # Rebuild weekly so base image security patches are picked up
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  publish-base-image:
    name: Publish base devcontainer image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/devcontainer-base
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .ybdb.Dockerfile
          # Build both architectures so ARM Codespaces and DevPod on Apple Silicon work
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
