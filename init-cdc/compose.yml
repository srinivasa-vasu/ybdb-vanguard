version: '3.9'

# ── CDC stack: Debezium (ZK + Kafka + Connect) + PostgreSQL sink ──────────────
#
# Base: network_mode: host so service-to-service addresses can use 127.0.0.1.
# Runtime override (generated by start-cdc.sh):
#   network_mode: "container:<devcontainer-id>"  replaces 'host' on every
#   service so the whole stack shares the devcontainer's network namespace.
#   Result: 127.0.0.1:{2181,9092,8083,5432} are all reachable directly from
#   ysqlsh / curl inside the devcontainer, and Kafka Connect can reach
#   YugabyteDB at 127.0.0.1:5433.
#
# KAFKA_ADVERTISED_HOST_NAME=127.0.0.1 keeps the broker metadata redirect
# on loopback so Kafka Connect does not try to reconnect to the bridge IP.

services:

  zookeeper:
    image: quay.io/debezium/zookeeper:${DEBEZIUM_VERSION:-3.1.3.Final}
    platform: linux/amd64
    network_mode: host
    restart: on-failure

  kafka:
    image: quay.io/debezium/kafka:${DEBEZIUM_VERSION:-3.1.3.Final}
    platform: linux/amd64
    network_mode: host
    depends_on: [zookeeper]
    environment:
      - ZOOKEEPER_CONNECT=127.0.0.1:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - KAFKA_ADVERTISED_HOST_NAME=127.0.0.1
    restart: on-failure

  connect:
    image: quay.io/debezium/connect:${DEBEZIUM_VERSION:-3.1.3.Final}
    platform: linux/amd64
    network_mode: host
    depends_on: [kafka]
    environment:
      - BOOTSTRAP_SERVERS=127.0.0.1:9092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=cdc_connect_configs
      - OFFSET_STORAGE_TOPIC=cdc_connect_offsets
      - STATUS_STORAGE_TOPIC=cdc_connect_statuses
    volumes:
      - kafka-plugins:/kafka/connect/yugabytedb
    restart: on-failure

  postgresql:
    container_name: postgres
    image: postgres:14
    network_mode: host
    environment:
      POSTGRES_PASSWORD: yugabyte
      POSTGRES_DB: postgres
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: on-failure

volumes:
  postgresql_data:
  kafka-plugins:
