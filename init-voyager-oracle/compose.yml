version: '3.9'

services:
  oracle:
    image: gvenzl/oracle-free
    container_name: oracle
    # Use the shared Docker network so the devcontainer (and yb-voyager wrapper)
    # can reach Oracle by container name "oracle". SRC_HOST=oracle in devcontainer.json.
    networks:
      - ybdb-vanguard-net
    restart: always
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:-YbVanguard1}
    volumes:
      - oracle-data:/opt/oracle/oradata
    shm_size: "2g"


networks:
  ybdb-vanguard-net:
    external: true

volumes:
  oracle-data:
