version: '3.9'

services:
  oracle:
    image: mgvenzl/oracle-free
    container_name: oracle
    # Use the shared Docker network so the devcontainer (and yb-voyager wrapper)
    # can reach Oracle by container name "oracle". SRC_HOST=oracle in devcontainer.json.
    networks:
      - ybdb-vanguard-net
    restart: always
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:-YbVanguard1}
      - ORACLE_PDB=${ORACLE_PDB:-MYPDB}
    volumes:
      - oracle-data:/opt/oracle/oradata
    shm_size: "2g"

  oracle-client:
    image: gvenzl/oracle-instantclient-sqlplus
    container_name: oracle-client
    depends_on:
      - oracle
    networks:
      - ybdb-vanguard-net
    command: ["tail", "-f", "/dev/null"]

networks:
  ybdb-vanguard-net:
    external: true

volumes:
  oracle-data:
